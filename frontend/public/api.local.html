<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SportFlow — API local</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }
      body {
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 0.875rem;
        margin-top: 1rem;
        margin-bottom: 0.25rem;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem 0.6rem;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 0.9rem;
      }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #0f766e;
        color: #fff;
      }
      button:hover {
        background: #0d9488;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      pre {
        margin-top: 1rem;
        padding: 1rem;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        overflow: auto;
        font-size: 0.8rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .hint {
        font-size: 0.8rem;
        color: #64748b;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>PATCH usuario — nacionalidad Nicaragua</h1>
    <p class="hint">
      Abrí esta página desde el dev server de Angular (<code
        >http://localhost:4200/api.local.html</code
      >) para que el navegador pueda llamar al API sin CORS.
    </p>

    <label for="baseUrl">Base URL del API</label>
    <input id="baseUrl" type="url" value="http://localhost:3000" />

    <label for="userId">ID del usuario (UUID)</label>
    <input
      id="userId"
      type="text"
      placeholder="pega aquí el id del usuario"
      autocomplete="off"
    />

    <button type="button" id="sendPatch">Enviar PATCH (nationality: Nicaragua)</button>

    <pre id="out">(sin respuesta aún)</pre>

    <script>
      const baseUrl = document.getElementById('baseUrl');
      const userId = document.getElementById('userId');
      const out = document.getElementById('out');
      const btn = document.getElementById('sendPatch');

      async function sendPatch() {
        const id = userId.value.trim();
        if (!id) {
          out.textContent = 'Indicá el ID del usuario.';
          return;
        }
        const base = baseUrl.value.replace(/\/+$/, '');
        btn.disabled = true;
        out.textContent = 'Enviando…';
        try {
          const res = await fetch(`${base}/users/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nationality: 'Nicaragua' }),
          });
          const text = await res.text();
          let body;
          try {
            body = JSON.parse(text);
          } catch {
            body = text;
          }
          out.textContent =
            res.status +
            ' ' +
            res.statusText +
            '\n\n' +
            (typeof body === 'string' ? body : JSON.stringify(body, null, 2));
        } catch (e) {
          out.textContent = String(e);
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener('click', sendPatch);
    </script>
  </body>
</html>

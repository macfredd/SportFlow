<section class="w-full max-w-none px-3 sm:px-5 md:px-8 lg:px-10">
  <h1 class="text-xl font-semibold text-[var(--text-primary)] md:text-2xl">
    {{ 'activity.detailTitle' | transloco }}
  </h1>
  <p class="mt-2 text-sm text-[var(--text-secondary)]">
    {{ 'activity.detailIdLabel' | transloco }}:
    @if (activity(); as act) {
      <code class="rounded bg-[var(--surface)] px-1 py-0.5 text-[var(--text-primary)]">{{ act.id }}</code>
    } @else {
      <code class="rounded bg-[var(--surface)] px-1 py-0.5 text-[var(--text-primary)]">{{
        'common.empty' | transloco
      }}</code>
    }
  </p>

  @if (loading()) {
    <div class="mt-6 flex justify-center py-8">
      <mat-spinner diameter="40" aria-hidden="true" />
    </div>
  } @else if (loadError()) {
    <p class="mt-6 text-sm text-[var(--text-secondary)]" role="alert">
      {{ 'activity.detailLoadError' | transloco }}
    </p>
  } @else if (activity(); as act) {
    <div class="mt-6">
      <app-activity-summary [activity]="act" />
    </div>
    <div class="mt-6">
      <app-activity-map [route]="activityRoute() ?? []" />
    </div>
  }
</section>
